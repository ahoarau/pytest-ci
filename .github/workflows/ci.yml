name: CI

on: [push, pull_request]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  VCPKG_COMMAND: C:/vcpkg/vcpkg.exe --vcpkg-root=C:/vcpkg
  VCPKG_DEFAULT_BINARY_CACHE: ${{ github.workspace }}/vcpkg-bincache
  VCPKG_BINARY_SOURCES: "clear;files,${{ github.workspace }}/vcpkg-bincache,readwrite"

jobs:
  pixi-ci:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
          - os: macos-15-intel
          - os: macos-26
          - os: windows-2025

    steps:
      - uses: actions/checkout@v6
      - uses: prefix-dev/setup-pixi@v0.9.5
      - run: pixi run test

  windows-with-vcpkg:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.image }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: windows-2022
            name: Windows Server 2022
            arch: x64

          # - image: windows-2025
          #   name: Windows Server 2025
          #   arch: x64

          # - image: windows-11-arm
          #   name: Windows 11 ARM64
          #   arch: arm64

    steps:
      - uses: actions/checkout@v6
      - uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{ matrix.arch }}

      - name: Create vcpkg binary cache directory
        run: mkdir -p ${{ env.VCPKG_DEFAULT_BINARY_CACHE }}

      - name: Restore vcpkg binary cache
        id: cache-vcpkg-restore
        uses: actions/cache/restore@v4
        with:
          path: ${{ env.VCPKG_DEFAULT_BINARY_CACHE }}
          key: vcpkg-${{ matrix.image }}-${{ matrix.arch }}-${{ github.sha }}
          restore-keys: vcpkg-${{ matrix.image }}-${{ matrix.arch }}-

      - name: Install C++ dependencies (via vcpkg)
        run: |
          ${{ env.VCPKG_COMMAND }} install python3

      - name: Save vcpkg binary cache
        uses: actions/cache/save@v4
        with:
          path: ${{ env.VCPKG_DEFAULT_BINARY_CACHE }}
          key: ${{ steps.cache-vcpkg-restore.outputs.cache-primary-key }}

      - name: Install Python dependencies (via pip)
        run: |
          C:/vcpkg/installed/${{ matrix.arch }}-windows/tools/python3/python.exe -m ensurepip --upgrade
          C:/vcpkg/installed/${{ matrix.arch }}-windows/tools/python3/python.exe -m pip install nanobind pytest numpy

      - name: Debug Python locations
        run: |
          Get-Command python | Select-Object -ExpandProperty Source
          Get-Command pip | Select-Object -ExpandProperty Source
          python --version
          pip --version

      - name: Configure project
        env:
          Python_ROOT: C:/vcpkg/installed/${{ matrix.arch }}-windows/tools/python3
          CMAKE_TOOLCHAIN_FILE: C:/vcpkg/scripts/buildsystems/vcpkg.cmake
        run: cmake -G Ninja -S . -B build --log-level=DEBUG

  windows-long-path-check:
    name: Check Windows long path support
    runs-on: windows-2025
    steps:
      - name: Check long path support in registry
        run: |
          $val = (Get-ItemProperty "HKLM:\SYSTEM\CurrentControlSet\Control\FileSystem" -Name LongPathsEnabled -ErrorAction SilentlyContinue).LongPathsEnabled
          if ($val -eq 1) {
            Write-Host "Long path support is ENABLED (LongPathsEnabled = 1)"
          } else {
            Write-Host "Long path support is DISABLED (LongPathsEnabled = $val)"
          }

      - name: Enable long path support
        run: |
          Set-ItemProperty "HKLM:\SYSTEM\CurrentControlSet\Control\FileSystem" -Name LongPathsEnabled -Value 1
          Write-Host "LongPathsEnabled set to 1"

      - name: Verify long path support is enabled
        run: |
          $val = (Get-ItemProperty "HKLM:\SYSTEM\CurrentControlSet\Control\FileSystem" -Name LongPathsEnabled).LongPathsEnabled
          if ($val -eq 1) {
            Write-Host "Long path support is ENABLED (LongPathsEnabled = 1)"
          } else {
            Write-Host "Long path support is still DISABLED (LongPathsEnabled = $val)"
            exit 1
          }
